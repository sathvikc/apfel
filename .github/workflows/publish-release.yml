name: Publish Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Version bump to publish
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  publish:
    runs-on: macos-26
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TYPE: ${{ inputs.release_type }}
      TAP_REPOSITORY: Arthur-Ficial/homebrew-tap
      TAP_BRANCH: main
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Verify tap token is configured
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_PUSH_TOKEN }}
        run: |
          if [[ -z "$TAP_TOKEN" ]]; then
            echo "Missing HOMEBREW_TAP_PUSH_TOKEN repository secret."
            echo "Create a fine-grained GitHub token with Contents: Read and write on $TAP_REPOSITORY."
            exit 1
          fi

      - name: Bump version and build release
        run: |
          case "$RELEASE_TYPE" in
            patch) make build ;;
            minor) make release-minor ;;
            major) make release-major ;;
            *)
              echo "Unsupported release type: $RELEASE_TYPE"
              exit 1
              ;;
          esac

      - name: Run unit tests
        run: swift run apfel-tests

      - name: Capture release version
        id: version
        run: echo "value=$(cat .version)" >> "$GITHUB_OUTPUT"

      - name: Commit release files
        run: |
          version="${{ steps.version.outputs.value }}"
          git add .version README.md Sources/BuildInfo.swift
          git commit -m "release v$version"
          git tag "v$version"
          git push origin HEAD:main --follow-tags

      - name: Package release artifact
        id: asset
        run: |
          make package-release-asset >/tmp/apfel-release-asset.txt
          echo "name=$(tail -1 /tmp/apfel-release-asset.txt)" >> "$GITHUB_OUTPUT"
          echo "sha256=$(make print-release-sha256)" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        run: |
          version="${{ steps.version.outputs.value }}"
          asset="${{ steps.asset.outputs.name }}"
          if gh release view "v$version" >/dev/null 2>&1; then
            gh release upload "v$version" "$asset" --clobber
          else
            gh release create "v$version" "$asset" --title "v$version" --notes "Automated release for v$version"
          fi

      - name: Check out homebrew tap
        uses: actions/checkout@v4
        with:
          repository: Arthur-Ficial/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_PUSH_TOKEN }}
          ref: main
          path: homebrew-tap

      - name: Update Homebrew formula
        run: |
          make update-homebrew-formula \
            HOMEBREW_FORMULA_OUTPUT="homebrew-tap/Formula/apfel.rb" \
            HOMEBREW_FORMULA_SHA256="${{ steps.asset.outputs.sha256 }}"

      - name: Push Homebrew tap update
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- Formula/apfel.rb; then
            echo "Homebrew formula already up to date."
            exit 0
          fi
          version="${{ steps.version.outputs.value }}"
          git add Formula/apfel.rb
          git commit -m "apfel v$version"
          git push origin HEAD:$TAP_BRANCH
